<!DOCTYPE html>
<html>
<head>
  <meta name="js-widget-title" content="Webcam Rionero">
  <meta name="viewport" content="width=360, initial-scale=1, maximum-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 360px;
      height: 169px;
      background: #000;
      overflow: hidden;
    }
    #cam {
      width: 360px;
      height: 169px;
      object-fit: cover;
      display: block;
    }
    #status {
      position: absolute;
      top: 7px;
      left: 20px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4caf50;
    }
    #overlay {
      position: absolute;
      bottom: 6px;
      right: 8px;
      color: rgba(255,255,255,0.75);
      font-size: 10px;
      font-family: -apple-system, sans-serif;
      background: rgba(0,0,0,0.45);
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <img id="cam" src="" alt="webcam">
  <div id="status"></div>
  <div id="overlay">--:--</div>

  <script>
    var ALIAS = '679763c666103';
    var INTERVAL = 10000;
    var img = document.getElementById('cam');
    var overlay = document.getElementById('overlay');
    var dot = document.getElementById('status');

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function updateTime() {
      var d = new Date();
      overlay.textContent = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    function loadSnapshot() {
      var url = 'https://g0.ipcamlive.com/player/snapshot.php?alias=' + ALIAS + '&t=' + Date.now();
      var tmp = new Image();
      tmp.onload = function() {
        img.src = tmp.src;
        dot.style.background = '#4caf50';
        updateTime();
      };
      tmp.onerror = function() {
        dot.style.background = '#f44336';
      };
      tmp.src = url;
    }

    function __wweb2WaitMillisecondsToWidgetIsReady(currentDelayMs) {
      return (img.complete && img.naturalWidth > 0) ? 0 : 2000;
    }

    loadSnapshot();
    setInterval(loadSnapshot, INTERVAL);
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
